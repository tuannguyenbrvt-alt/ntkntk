name: Deploy Website to PA Vietnam

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Deploying to PA Vietnam Hosting
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21                  # Cổng kết nối FTP tiêu chuẩn
        protocol: ftp             # Ép buộc sử dụng FTP thường (bỏ qua bắt tay bảo mật FTPS dễ bị chặn bởi PA Vietnam)
        local-dir: ./
        server-dir: /public_html/  # Thư mục chứa code trên hosting PA Vietnam
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/database.sql
          **/source_code_fixed.zip
          **/php.ini
