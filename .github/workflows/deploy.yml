name: Deploy Website to PA Vietnam

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Deploying to PA Vietnam Hosting
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3
    
    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: /public_html/  # Thư mục gốc chứa code trên hosting PA Vietnam (thường là /public_html/)
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/database.sql
          **/source_code_fixed.zip
          **/php.ini
